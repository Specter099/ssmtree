name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        # -c pins the full transitive graph (constraints-dev.txt) so CI installs
        # are reproducible. pip-audit is included via the dev extra.
        # setuptools is upgraded past PYSEC-2026-3447 (fixed in 83.0.0); the
        # ambient runner setuptools is older and pip-audit flags it.
        run: |
          pip install -e ".[dev]" -c constraints-dev.txt
          python -m pip install --upgrade "setuptools>=83.0.0"

      - name: Lint with ruff
        run: ruff check src tests

      - name: Type-check with mypy
        run: mypy src

      - name: Audit dependencies
        # Suppressed CVEs have no fixed upstream release yet. Re-check on every
        # dependency bump and drop the --ignore-vuln flag once patched.
        run: pip-audit --ignore-vuln CVE-2026-4539 --ignore-vuln CVE-2026-3219

      - name: Run tests
        run: pytest --cov=ssmtree --cov-report=term-missing --cov-fail-under=90

      - name: Upload coverage report
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: coverage-report
          path: htmlcov/
          if-no-files-found: ignore
